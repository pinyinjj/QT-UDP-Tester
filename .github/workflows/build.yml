name: Build and Package

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        
    - name: Build EXE
      run: |
        pyinstaller --noconsole --onefile --name "QT-UDP-Tester" --hidden-import PyQt5.sip udp_tool_gui.py
        
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: QT-UDP-Tester-Windows
        path: dist/QT-UDP-Tester.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3-dev
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        
    - name: Build Binary
      run: |
        pyinstaller --noconsole --onefile --name "qt-udp-tester" --hidden-import PyQt5.sip udp_tool_gui.py
        
    - name: Create DEB Package
      run: |
        mkdir -p package/usr/bin
        mkdir -p package/usr/share/applications
        mkdir -p package/DEBIAN
        
        cp dist/qt-udp-tester package/usr/bin/
        
        cat <<EOF > package/DEBIAN/control
        Package: qt-udp-tester
        Version: 1.0.0
        Section: utils
        Priority: optional
        Architecture: amd64
        Maintainer: Gemini CLI
        Description: A modern UDP tool with Fluent UI
        EOF
        
        cat <<EOF > package/usr/share/applications/qt-udp-tester.desktop
        [Desktop Entry]
        Name=QT-UDP-Tester
        Exec=/usr/bin/qt-udp-tester
        Type=Application
        Icon=utilities-terminal
        Categories=Development;
        EOF
        
        chmod +x package/usr/bin/qt-udp-tester
        dpkg-deb --build package qt-udp-tester.deb
        
    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: QT-UDP-Tester-Linux
        path: qt-udp-tester.deb
