name: Build and Release

on:
  push:
    branches: [ build-release ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get latest tag
      id: get_version
      run: |
        $tags = git tag --sort=-v:refname | Select-String -Pattern '^v\d+\.\d+\.\d+$' | Select-Object -First 1
        if ($tags) {
          $version = $tags -replace '^v', ''
          $parts = $version.Split('.')
          $newPatch = [int]$parts[2] + 1
          $newVersion = "v$($parts[0]).$($parts[1]).$newPatch"
        } else {
          $newVersion = "v1.0.0"
        }
        $versionNumber = $newVersion -replace '^v', ''
        echo "VERSION=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        echo "VERSION_NUMBER=$versionNumber" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Download UPX
      run: |
        New-Item -ItemType Directory -Force -Path $env:TEMP\upx
        Invoke-WebRequest -Uri "https://github.com/upx/upx/releases/download/v3.96/upx-3.96-win64.zip" -OutFile $env:TEMP\upx.zip
        Expand-Archive -Path $env:TEMP\upx.zip -DestinationPath $env:TEMP\upx -Force
        Remove-Item $env:TEMP\upx.zip

    - name: Build EXE
      run: |
        pyinstaller --noconsole --onefile --name "QT-UDP-Tester" --hidden-import PyQt5.sip --upx-dir=$env:TEMP\upx\upx-3.96-win64 udp_tool_gui.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-exe
        path: dist/QT-UDP-Tester.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get latest tag
      id: get_version
      run: |
        latest_tag=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
        if [ -n "$latest_tag" ]; then
          version="${latest_tag#v}"
          major=$(echo $version | cut -d. -f1)
          minor=$(echo $version | cut -d. -f2)
          patch=$(echo $version | cut -d. -f3)
          new_patch=$((patch + 1))
          new_version="v${major}.${minor}.${new_patch}"
        else
          new_version="v1.0.0"
        fi
        echo "VERSION=$new_version" >> $GITHUB_OUTPUT
        echo "VERSION_NUMBER=${new_version#v}" >> $GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3-dev upx-ucl
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Binary
      run: |
        pyinstaller --noconsole --onefile --name "qt-udp-tester" \
          --hidden-import PyQt5.sip \
          --add-data "icons:icons" \
          --exclude-module scipy \
          --exclude-module scipy.spatial \
          --exclude-module scipy.special \
          --exclude-module scipy.linalg \
          --exclude-module scipy.stats \
          --exclude-module unittest \
          --exclude-module xml.etree \
          --exclude-module html \
          --exclude-module tkinter \
          --exclude-module turtle \
          --exclude-module cv2 \
          --exclude-module lib2to3 \
          udp_tool_gui.py

    - name: Compress Binary
      run: |
        upx -9 -o dist/qt-udp-tester-compressed dist/qt-udp-tester || true
        if [ -f dist/qt-udp-tester-compressed ]; then
          mv dist/qt-udp-tester-compressed dist/qt-udp-tester
          echo "UPX compression successful"
        else
          echo "UPX compression failed, using uncompressed binary"
        fi

    - name: Create DEB Package
      run: |
        mkdir -p package/usr/bin
        mkdir -p package/usr/share/applications
        mkdir -p package/usr/share/icons
        mkdir -p package/DEBIAN

        cp dist/qt-udp-tester package/usr/bin/
        cp icons/icon.svg package/usr/share/icons/qt-udp-tester.svg

        cat <<EOF > package/DEBIAN/control
        Package: qt-udp-tester
        Version: ${{ steps.get_version.outputs.VERSION_NUMBER }}
        Section: utils
        Priority: optional
        Architecture: amd64
        Maintainer: Gemini CLI
        Description: A modern UDP tool with Fluent UI
        EOF

        cat <<EOF > package/usr/share/applications/qt-udp-tester.desktop
        [Desktop Entry]
        Name=QT-UDP-Tester
        Exec=/usr/bin/qt-udp-tester
        Type=Application
        Icon=qt-udp-tester.svg
        Categories=Development;
        EOF

        chmod +x package/usr/bin/qt-udp-tester

        # Add postinst script to update icon cache after installation
        printf '#!/bin/bash\nupdate-icon-caches /usr/share/icons 2>/dev/null || true\n' > package/DEBIAN/postinst
        chmod +x package/DEBIAN/postinst

        dpkg-deb --build package qt-udp-tester.deb

    - name: Upload DEB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-deb
        path: qt-udp-tester.deb

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Get next version
      id: get_version
      run: |
        latest_tag=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
        if [ -n "$latest_tag" ]; then
          version="${latest_tag#v}"
          major=$(echo $version | cut -d. -f1)
          minor=$(echo $version | cut -d. -f2)
          patch=$(echo $version | cut -d. -f3)
          new_patch=$((patch + 1))
          new_version="v${major}.${minor}.${new_patch}"
        else
          new_version="v1.0.0"
        fi
        echo "VERSION=$new_version" >> $GITHUB_OUTPUT
        echo "VERSION_NUMBER=${new_version#v}" >> $GITHUB_OUTPUT

    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-exe
        path: release-assets

    - name: Download Linux Artifact
      uses: actions/download-artifact@v4
      with:
        name: linux-deb
        path: release-assets

    - name: Rename assets
      run: |
        mv release-assets/QT-UDP-Tester.exe "release-assets/QT-UDP-Tester-${{ steps.get_version.outputs.VERSION }}-Windows.exe"
        mv release-assets/qt-udp-tester.deb "release-assets/QT-UDP-Tester-${{ steps.get_version.outputs.VERSION }}-Linux.deb"

    - name: Create Tag
      run: |
        git tag ${{ steps.get_version.outputs.VERSION }}
        git push origin ${{ steps.get_version.outputs.VERSION }}

    - name: Install git-cliff
      run: |
        curl -L https://github.com/orhun/git-cliff/releases/download/v2.5.0/git-cliff-2.5.0-x86_64-unknown-linux-gnu.tar.gz | tar -xz
        mv git-cliff-*/git-cliff /usr/local/bin/
        rm -rf git-cliff-*

    - name: Generate changelog
      id: changelog
      run: |
        # Get all tags sorted by version
        tags=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$')
        echo "Tags: $tags"

        # Get previous tag (second in list, first is the one we'll create)
        last_tag=$(echo "$tags" | sed -n '2p')
        if [ -z "$last_tag" ]; then
          last_tag="v0.0.0"
        fi
        echo "Using last_tag: '$last_tag'"
        echo "Current tag: ${{ steps.get_version.outputs.VERSION }}"

        # Generate changelog using git-cliff
        git-cliff --previous-tag "$last_tag" --current-tag "${{ steps.get_version.outputs.VERSION }}" --output release-body.md

        # Append installation instructions
        echo "" >> release-body.md
        echo "### Installation" >> release-body.md
        echo "- **Windows**: Download and run the \`.exe\` file." >> release-body.md
        echo "- **Linux**: Install using \`sudo dpkg -i QT-UDP-Tester-${{ steps.get_version.outputs.VERSION }}-Linux.deb\`." >> release-body.md

        echo "=== Generated changelog ==="
        cat release-body.md

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag_name: ${{ steps.get_version.outputs.VERSION }}
        name: ${{ steps.get_version.outputs.VERSION }}
        files: |
          release-assets/QT-UDP-Tester-${{ steps.get_version.outputs.VERSION }}-Windows.exe
          release-assets/QT-UDP-Tester-${{ steps.get_version.outputs.VERSION }}-Linux.deb
        body_path: release-body.md
        draft: false
        prerelease: false
