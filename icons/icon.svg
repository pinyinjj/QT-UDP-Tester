<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="holoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF758C" />   <stop offset="20%" stop-color="#FFB199" />  <stop offset="40%" stop-color="#FEE140" />  <stop offset="60%" stop-color="#84FAB0" />  <stop offset="80%" stop-color="#8FD3F4" />  <stop offset="100%" stop-color="#D4A5FF" /> </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
